# Manual agreement E2E — same shape as a typical internal "Billing API" style workflow:
# checkout → JDK → Gradle test with secrets in env → optional artifact.
#
# Secrets (repository → Settings → Actions): EAPI_APP_ID, EAPI_APP_KEY, EAPI_AUTHORIZATION

name: eAPI Create Agreement E2E

on:
  workflow_dispatch:
    inputs:
      environment_profile:
        description: 'Target stack (eapiBaseUrl from src/main/resources/e2e/environments.json)'
        type: choice
        required: true
        default: qa-eapi-dev
        options:
          - qa-eapi-dev
          - staging
          - beta
      club_number:
        description: 'Club number (5-digit, e.g. 06060)'
        type: string
        required: true
        default: '06060'
      payment_plan:
        description: 'Plan name from eAPI Get All Plans (e.g. INSTALLMENT, CASH)'
        type: string
        required: true
        default: INSTALLMENT
      agreement_count:
        description: 'How many agreements to create on this run (1–100, sequential in one job)'
        type: string
        required: true
        default: '1'
      require_club_catalog:
        description: 'If true, club_number must exist in e2e/clubs.json'
        type: boolean
        required: true
        default: false
      test_class:
        description: 'Optional full class name (overrides default agreement test)'
        type: string
        required: false
        default: ''

permissions:
  contents: read
  actions: write # upload-artifact

concurrency:
  group: eapi-create-agreement-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  agreement-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run tests
        env:
          EAPI_APP_ID: ${{ secrets.EAPI_APP_ID }}
          EAPI_APP_KEY: ${{ secrets.EAPI_APP_KEY }}
          EAPI_AUTHORIZATION: ${{ secrets.EAPI_AUTHORIZATION }}
          E2E_ENV_PROFILE: ${{ inputs.environment_profile }}
          E2E_CLUB_NUMBER: ${{ inputs.club_number }}
          E2E_PAYMENT_PLAN: ${{ inputs.payment_plan }}
          E2E_REQUIRE_CLUB_CATALOG: ${{ inputs.require_club_catalog }}
          E2E_TOTAL_AGREEMENTS: ${{ inputs.agreement_count }}
          E2E_SHARD_COUNT: '1'
          E2E_SHARD_INDEX: '0'
          OPTIONAL_TEST_CLASS: ${{ inputs.test_class }}
        run: |
          chmod +x ./gradlew
          echo "E2E profile=${E2E_ENV_PROFILE} club=${E2E_CLUB_NUMBER} agreements=${E2E_TOTAL_AGREEMENTS}"
          if [ -n "${OPTIONAL_TEST_CLASS}" ]; then
            ./gradlew test --no-daemon --stacktrace --tests "${OPTIONAL_TEST_CLASS}"
          else
            ./gradlew test --no-daemon --stacktrace --tests com.membertransfer.e2e.eapi.CreateAgreementE2ETest
          fi

      - name: Results summary
        if: always()
        run: python3 .github/scripts/summarize_agreement_results.py build/e2e-agreement-results

      - name: Upload agreement results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agreement-results
          path: build/e2e-agreement-results/
          if-no-files-found: ignore
